name: Build & Release Firmware

# Triggered by version tags (git tag v1.0.0 && git push --tags)
# or manually via "Run workflow" on GitHub Actions.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build ESP32-C3 firmware

    # ubuntu-22.04 ships Python 3.10 by default.
    # connectedhomeip's Pigweed bootstrap is incompatible with Python 3.12
    # (the default in the espressif/idf:v5.4 Docker image), so we install
    # everything manually here on a compatible base OS.
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build ccache \
            python3-pip python3-venv python3-dev \
            libssl-dev libffi-dev libusb-1.0-0

      # ── Always clone ESP-IDF (shallow, ~10 s) ─────────────────────────────
      # The source tree is light; the heavy parts (toolchain, Python env)
      # are installed into ~/.espressif and cached separately.
      - name: Clone ESP-IDF v5.4
        run: |
          git clone --depth 1 -b v5.4 \
            https://github.com/espressif/esp-idf.git ~/esp/esp-idf

      # ── Cache ESP-IDF toolchain + esp-matter ──────────────────────────────
      # ~/.espressif   — RISC-V toolchain + IDF Python env (~1-2 GB)
      # ~/esp/esp-matter — esp-matter source + connectedhomeip Pigweed env (~3-4 GB)
      # Both are populated only on cache-miss (first run or key change).
      - name: Cache build tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ~/esp/esp-matter
          key: build-tools-ubuntu22-idf5.4-v2
          restore-keys: |
            build-tools-ubuntu22-idf5.4-

      # ── Install ESP-IDF tools (cache miss only, ~5 min) ───────────────────
      - name: Install ESP-IDF tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          cd ~/esp/esp-idf
          ./install.sh esp32c3

      # ── Clone & install esp-matter (cache miss only, ~20-30 min) ─────────
      - name: Clone esp-matter
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 \
            https://github.com/espressif/esp-matter.git ~/esp/esp-matter
          cd ~/esp/esp-matter
          git submodule update --init --depth 1 \
            connectedhomeip/connectedhomeip

      - name: Patch connectedhomeip — remove mobly dependency
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          # `mobly` is a Python test framework whose pip dependencies conflict
          # with connectedhomeip's required protobuf version.  It is never
          # needed for firmware builds — only for running Android device tests.
          #
          # Use a precise regex so we only remove lines where mobly appears as
          # a *requirement* (line starts with optional whitespace then "mobly"),
          # NOT lines like "name = chip-mobly" where it is part of a name.
          CHIP_ROOT="$HOME/esp/esp-matter/connectedhomeip/connectedhomeip"
          find "$CHIP_ROOT/integrations" \
            \( -name "requirements*.txt" -o -name "setup.cfg" -o -name "setup.py" \) \
            2>/dev/null \
            | xargs grep -l -i "mobly" 2>/dev/null \
            | xargs -I{} sed -i '/^[[:space:]]*[Mm]obly/d' {} 2>/dev/null \
            || true
          echo "Patch complete — mobly dependency lines removed from connectedhomeip integrations"

      - name: Install esp-matter toolchain
        if: steps.cache-tools.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Source IDF first — install.sh needs IDF_PATH for some steps
          source ~/esp/esp-idf/export.sh
          cd ~/esp/esp-matter
          ./install.sh

      # ── Build ──────────────────────────────────────────────────────────────
      # IMPORTANT: source commands only persist within the same run: block.
      # Both source lines and the build command MUST live together.
      - name: Build firmware
        shell: bash
        run: |
          set -e
          source ~/esp/esp-idf/export.sh
          source ~/esp/esp-matter/export.sh

          idf.py set-target esp32c3
          idf.py build

      # ── Collect binaries ───────────────────────────────────────────────────
      - name: Collect binary files
        run: |
          mkdir -p artifacts
          cp build/bootloader/bootloader.bin            artifacts/bootloader.bin
          cp build/partition_table/partition-table.bin  artifacts/partition-table.bin
          cp build/ble_matter_bridge.bin                artifacts/ble_matter_bridge.bin

          echo "## Build info"                                                > artifacts/BUILD_INFO.md
          echo "- Commit: \`$GITHUB_SHA\`"                                  >> artifacts/BUILD_INFO.md
          echo "- ESP-IDF: v5.4"                                             >> artifacts/BUILD_INFO.md
          echo "- esp-matter: \`$(git -C ~/esp/esp-matter rev-parse --short HEAD 2>/dev/null || echo unknown)\`" >> artifacts/BUILD_INFO.md
          echo ""                                                             >> artifacts/BUILD_INFO.md
          echo "## Flash offsets"                                             >> artifacts/BUILD_INFO.md
          echo "| File | Offset |"                                           >> artifacts/BUILD_INFO.md
          echo "|------|--------|"                                           >> artifacts/BUILD_INFO.md
          echo "| bootloader.bin | 0x0000 |"                                >> artifacts/BUILD_INFO.md
          echo "| partition-table.bin | 0x8000 |"                           >> artifacts/BUILD_INFO.md
          echo "| ble_matter_bridge.bin | 0x20000 |"                        >> artifacts/BUILD_INFO.md

      # ── Upload artifacts (available even if Release step fails) ───────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32c3
          path: artifacts/
          retention-days: 90

      # ── Determine release tag ─────────────────────────────────────────────
      - name: Set release tag
        id: tag
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.value }}
          name:       "BLE-Matter-Bridge ${{ steps.tag.outputs.value }}"
          body_path:  artifacts/BUILD_INFO.md
          files: |
            artifacts/bootloader.bin
            artifacts/partition-table.bin
            artifacts/ble_matter_bridge.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
