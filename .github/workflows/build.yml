name: Build & Release Firmware

# Triggered by version tags (git tag v1.0.0 && git push --tags)
# or manually via "Run workflow" on GitHub Actions.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build ESP32-C3 firmware
    runs-on: ubuntu-latest

    # ── Use Espressif's official ESP-IDF Docker image ──────────────────────
    # This image has ESP-IDF pre-installed and all tools ready.
    # IDF_PATH=/opt/esp/idf  and  ~/.espressif tools are pre-installed.
    # Tag reference: https://hub.docker.com/r/espressif/idf/tags
    container:
      image: espressif/idf:v5.4

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache esp-matter checkout ──────────────────────────────────────────
      # esp-matter itself (without connectedhomeip tools) is ~200 MB.
      # The connectedhomeip SDK tools are installed by esp-matter/install.sh
      # into ~/.espressif (already in the Docker image for IDF tools,
      # but chip-tool ARM toolchain is separate).
      - name: Cache esp-matter source + chip tools
        id: cache-matter
        uses: actions/cache@v4
        with:
          path: |
            /opt/esp/esp-matter
            /root/.espressif/tools/riscv32-esp-elf-clang
          key: esp-matter-idf5.4-${{ runner.os }}-v1

      # ── Clone & install esp-matter (only when cache misses) ───────────────
      - name: Clone esp-matter
        if: steps.cache-matter.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 \
            https://github.com/espressif/esp-matter.git /opt/esp/esp-matter
          cd /opt/esp/esp-matter
          # Only the connectedhomeip submodule is needed for building
          git submodule update --init --depth 1 \
            connectedhomeip/connectedhomeip

      - name: Install esp-matter toolchain
        if: steps.cache-matter.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd /opt/esp/esp-matter
          # install.sh sets up the Matter/CHIP build tools on top of IDF
          ./install.sh
        # This step can take 10-20 min on first run; subsequent runs use cache.

      # ── Build ──────────────────────────────────────────────────────────────
      # IMPORTANT: source commands only persist within the same run step.
      # Both sources and the build command MUST be in a single run block.
      - name: Build firmware
        shell: bash
        run: |
          set -e
          # Activate ESP-IDF (pre-installed in the Docker image)
          . $IDF_PATH/export.sh
          # Activate esp-matter (sets ESP_MATTER_PATH, MATTER_SDK_PATH, etc.)
          . /opt/esp/esp-matter/export.sh

          idf.py set-target esp32c3
          idf.py build

      # ── Collect binaries ───────────────────────────────────────────────────
      - name: Collect binary files
        run: |
          mkdir -p artifacts
          cp build/bootloader/bootloader.bin           artifacts/bootloader.bin
          cp build/partition_table/partition-table.bin  artifacts/partition-table.bin
          cp build/ble_matter_bridge.bin                artifacts/ble_matter_bridge.bin
          # Human-readable build info for the release notes
          echo "## Build info"                                             > artifacts/BUILD_INFO.md
          echo "- Commit: \`$GITHUB_SHA\`"                               >> artifacts/BUILD_INFO.md
          echo "- ESP-IDF: \`$(cat $IDF_PATH/version.txt 2>/dev/null || echo v5.4)\`" >> artifacts/BUILD_INFO.md
          echo "- esp-matter: \`$(git -C /opt/esp/esp-matter rev-parse --short HEAD 2>/dev/null || echo unknown)\`" >> artifacts/BUILD_INFO.md
          echo ""                                                          >> artifacts/BUILD_INFO.md
          echo "## Flash offsets"                                          >> artifacts/BUILD_INFO.md
          echo "| File | Offset |"                                        >> artifacts/BUILD_INFO.md
          echo "|------|--------|"                                        >> artifacts/BUILD_INFO.md
          echo "| bootloader.bin | 0x0000 |"                             >> artifacts/BUILD_INFO.md
          echo "| partition-table.bin | 0x8000 |"                        >> artifacts/BUILD_INFO.md
          echo "| ble_matter_bridge.bin | 0x20000 |"                     >> artifacts/BUILD_INFO.md

      # ── Upload artifacts (available even if Release step fails) ───────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32c3
          path: artifacts/
          retention-days: 90

      # ── Determine release tag ─────────────────────────────────────────────
      - name: Set release tag
        id: tag
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.tag.outputs.value }}
          name:       "BLE-Matter-Bridge ${{ steps.tag.outputs.value }}"
          body_path:  artifacts/BUILD_INFO.md
          files: |
            artifacts/bootloader.bin
            artifacts/partition-table.bin
            artifacts/ble_matter_bridge.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
